plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.iquizpros.debugapp'
    compileSdk 34

    defaultConfig {
        applicationId "com.iquizpros.debugapp"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
            debuggable true
        }
        release {
            minifyEnabled false  // Keep readable — this is a debug tool
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    // AndroidX core
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // RecyclerView
    implementation 'androidx.recyclerview:recyclerview:1.3.2'

    // CoordinatorLayout (for FAB + overlay)
    implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'

    // Material components (FAB, outlined buttons)
    implementation 'com.google.android.material:material:1.11.0'
}
