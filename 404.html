<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — iQuizPros</title>
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      display: inline-block;
    }
    .code {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.5rem;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
    }
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn-secondary {
      display: inline-block;
      margin-top: 0.75rem;
      color: #128c7e;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .btn-secondary:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">iQuizPros</div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Let's get you back to the quizzes!</p>
    <a class="btn" href="/">Take a Quiz</a><br>
    <a class="btn-secondary" href="javascript:history.back()">← Go back</a>
  </div>
</body>
</html>
